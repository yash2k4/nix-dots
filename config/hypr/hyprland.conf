############################
### VARIABLES / PROGRAMS ###
############################
$mainMod = SUPER
$terminal = kitty
$fileManager = nemo
$menu = fuzzel
$browser = firefox
$editor = nvim


################
### MONITORS ###
################
monitor=,preferred,auto,1


#################
### ENV VARS ###
#################
env = XCURSOR_THEME,Bibata-Modern-Ice
env = HYPRCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,32
env = HYPRCURSOR_SIZE,32


################
### EXEC ###
################
exec-once = hyprctl setcursor Bibata-Modern-Ice 32
exec-once = noctalia-shell
exec-once = hypridle
#exec-once = waybar


################
### GENERAL ###
################
general {
    layout = dwindle

    gaps_in = 2.5
    gaps_out = 2.5

    border_size = 3
    resize_on_border = false
    allow_tearing = false

    col.active_border = rgba(203,166,247,240)
    col.inactive_border = rgba(69,71,90,110)
}


###################
### ANIMATIONS ###
###################
animations {
    enabled = true

    bezier = instant, 0.05, 1, 0, 1
    bezier = fluid,   0.18, 0.95, 0.32, 1
    bezier = soft,    0.32, 0.88, 0.26, 1
    bezier = glide,   0.14, 0.85, 0.42, 1
    bezier = calm,    0.25, 0.80, 0.30, 1

    animation = windowsIn,  1, 4.5, fluid,  popin 70%
    animation = windowsOut, 1, 1.5, instant, popin 90%
    animation = windows,    1, 3.0, glide

    animation = workspaces, 0

    animation = layers,    1, 2.5, calm,  fade
    animation = layersIn,  1, 3.0, fluid, fade
    animation = layersOut, 1, 1.2, instant, fade

    animation = fade,     1, 2.5, calm
    animation = fadeIn,   1, 3.0, fluid
    animation = fadeOut,  1, 1.1, instant

    animation = border, 1, 2.2, soft
}


####################
### DECORATION ###
####################
decoration {
    rounding = 18

    dim_inactive = true
    dim_strength = 0.15

    shadow {
        enabled = true
        range = 22
        render_power = 3
        scale = 0.95
        color = rgba(203,166,247,70)
    }

    blur {
        enabled = true
        size = 7
        passes = 4
        vibrancy = 0.26
        vibrancy_darkness = 0.12
        noise = 0.01
        contrast = 1.12
        brightness = 1.0
        popups = true
        xray = false
    }
}


###########
### INPUT ###
###########
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

gesture = 3, horizontal, workspace

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


############
### MISC ###
############
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vfr = true
    background_color = rgba(30,30,46,230)
}


##############
### LAYOUT ###
##############
dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}


#############
### BINDS ###
#############
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, Q, killactive
bind = $mainMod SHIFT, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, B, exec, $browser
bind = $mainMod, F, exec, $fileManager
bind = $mainMod, SPACE, exec, $menu
bind = , PRINT, exec, flameshot gui
bind = $mainMod ALT, l, exec, hyprlock
bind = $mainMod SHIFT, R, exec, hyprctl reload

bind = $mainMod SHIFT, v, togglefloating
bind = $mainMod SHIFT, o, togglesplit
bind = $mainMod SHIFT, p, pseudo

bind = $mainMod, h, movefocus, l
bind = $mainMod, j, movefocus, d
bind = $mainMod, k, movefocus, u
bind = $mainMod, l, movefocus, r

bind = $mainMod SHIFT, h, swapwindow, l
bind = $mainMod SHIFT, j, swapwindow, d
bind = $mainMod SHIFT, k, swapwindow, u
bind = $mainMod SHIFT, l, swapwindow, r

bind = $mainMod CTRL, h, resizeactive, -40 0
bind = $mainMod CTRL, l, resizeactive, 40 0
bind = $mainMod CTRL, k, resizeactive, 0 -40
bind = $mainMod CTRL, j, resizeactive, 0 40

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, s, togglespecialworkspace, magic
bind = $mainMod SHIFT, s, movetoworkspace, special:magic

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow


#####################
### MEDIA / KEYS ###
#####################
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = , XF86AudioNext, exec, wpctl next
bindl = , XF86AudioPause, exec, wpctl play-pause
bindl = , XF86AudioPlay, exec, wpctl play-pause
bindl = , XF86AudioPrev, exec, wpctl previous

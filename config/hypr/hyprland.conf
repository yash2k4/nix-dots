$mainMod = SUPER

$terminal = kitty
$fileManager = nemo
$menu = fuzzel
$browser = firefox
$editor = nvim

monitor=,preferred,auto,1

env = XCURSOR_THEME,Bibata-Modern-Ice
env = HYPRCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,32
env = HYPRCURSOR_SIZE,32

exec-once = hyprctl setcursor Bibata-Modern-Ice 32
exec-once = qs -c noctalia-shell
exec-once = hypridle
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = gnome-keyring-daemon --start --components=secrets

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    numlock_by_default = true

    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
    }
}

gesture = 3, horizontal, workspace

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

general {
    gaps_in = 1
    gaps_out = 1
    gaps_workspaces = 1

    border_size = 2
    resize_on_border = true
    no_focus_fallback = true
    allow_tearing = false

    col.active_border   = rgba(203,166,247,230)
    col.inactive_border = rgba(120,121,145,100)

    layout = dwindle
}

decoration {
    rounding = 26

    active_opacity = 0.965
    inactive_opacity = 0.87
    fullscreen_opacity = 1.0

    dim_inactive = true
    dim_strength = 0.055

    shadow {
        enabled = true
        range = 60
        render_power = 8
        color = rgba(0,0,0,115)
        scale = 1.0
    }

    blur {
        enabled = true
        size = 11
        passes = 4
        ignore_opacity = false
        new_optimizations = true

        vibrancy = 0.52
        vibrancy_darkness = 0.12

        noise = 0.003
        contrast = 1.08
        brightness = 0.995

        popups = true
        popups_ignorealpha = 0.17
        xray = false
    }
}

animations {
    enabled = false

    bezier = instant, 0.00, 0.00, 1.00, 1.00
    bezier = god, 0.02, 0.98, 0.10, 1.00

    animation = windowsIn, 1, 1.2, god, popin 92%
    animation = windowsOut, 1, 0.6, instant, popin 100%
    animation = windows, 1, 1.0, god

    animation = workspaces, 0

    animation = layers, 1, 1.1, god, fade
    animation = layersIn, 1, 1.3, god, fade
    animation = layersOut, 1, 0.6, instant, fade

    animation = fade, 1, 1.1, god
    animation = fadeIn, 1, 1.3, god
    animation = fadeOut, 1, 0.6, instant

    animation = border, 1, 1.15, god
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = -1

    vfr = true
    vrr = 1

    background_color = rgba(8,8,12,240)

    focus_on_activate = true
    animate_manual_resizes = false
    animate_mouse_windowdragging = false

    layers_hog_keyboard_focus = true
}

bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, Q, killactive
bind = $mainMod SHIFT, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, B, exec, $browser
bind = $mainMod, F, exec, $fileManager
bind = $mainMod, SPACE, exec, $menu
bind = , PRINT, exec, flameshot gui
bind = $mainMod ALT, l, exec, hyprlock
bind = $mainMod SHIFT, R, exec, hyprctl reload

bind = $mainMod SHIFT, v, togglefloating
bind = $mainMod SHIFT, o, togglesplit
bind = $mainMod SHIFT, p, pseudo

bind = $mainMod, h, movefocus, l
bind = $mainMod, j, movefocus, d
bind = $mainMod, k, movefocus, u
bind = $mainMod, l, movefocus, r

bind = $mainMod SHIFT, h, swapwindow, l
bind = $mainMod SHIFT, j, swapwindow, d
bind = $mainMod SHIFT, k, swapwindow, u
bind = $mainMod SHIFT, l, swapwindow, r

bind = $mainMod CTRL, h, resizeactive, -40 0
bind = $mainMod CTRL, l, resizeactive, 40 0
bind = $mainMod CTRL, k, resizeactive, 0 -40
bind = $mainMod CTRL, j, resizeactive, 0 40

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, s, togglespecialworkspace, magic
bind = $mainMod SHIFT, s, movetoworkspace, special:magic

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = , XF86AudioNext, exec, wpctl next
bindl = , XF86AudioPause, exec, wpctl play-pause
bindl = , XF86AudioPlay, exec, wpctl play-pause
bindl = , XF86AudioPrev, exec, wpctl previous

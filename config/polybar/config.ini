[colors]
rosewater = #f5e0dc
flamingo = #f2cdcd
pink = #f5c2e7
mauve = #cba6f7
red = #f38ba8
maroon = #eba0ac
peach = #fab387
yellow = #f9e2af
green = #a6e3a1
teal = #94e2d5
sky = #89dceb
sapphire = #74c7ec
blue = #89b4fa
lavender = #b4befe
text = #cdd6f4
subtext1 = #bac2de
subtext0 = #a6adc8
overlay2 = #9399b2
overlay1 = #7f849c
overlay0 = #6c7086
surface2 = #585b70
surface1 = #45475a
surface0 = #313244
base = #1e1e2e
mantle = #181825
crust = #11111b
transparent = #00000000

[bar/toph]
monitor = ${env:MONITOR}
width = 100%
height = 28
radius = 0
background = ${colors.base}
foreground = ${colors.text}
bottom = true
line-size = 0
border-size = 0
padding-left = 0
padding-right = 1
module-margin = 0
separator = |
separator-foreground = ${colors.overlay0}
font-0 = JetBrainsMono Nerd Font Propo:size=14;6
modules-left = xworkspaces
modules-right = pulseaudio brightness battery memory cpu wlan eth date systray
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true

[settings]
screenchange-reload = true
pseudo-transparency = true

[module/systray]
type = internal/tray
tray-spacing = 8

[module/xworkspaces]
type = internal/xworkspaces
label-active = %name%
label-active-background = ${colors.mauve}
label-active-foreground = ${colors.crust}
label-active-padding = 1
label-occupied = %name%
label-occupied-padding = 1
label-urgent = %name%
label-urgent-background = ${colors.red}
label-urgent-padding = 1
label-empty = %name%
label-empty-foreground = ${colors.subtext1}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <label-volume>
label-volume = ’Ć©  %percentage%%
format-muted = <label-muted>
label-muted = Ņ╗©
label-muted-foreground = ${colors.subtext1}

[module/brightness]
type = internal/backlight
format-prefix = "¾░āĀ "
format-prefix-foreground = ${colors.mauve}
label = %percentage%%

[module/memory]
type = internal/memory
interval = 2
format-prefix = "’Æ╝ "
format-prefix-foreground = ${colors.mauve}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "¾░Šå "
format-prefix-foreground = ${colors.mauve}
label = %percentage:2%%

[module/battery]
type = internal/battery
battery = BAT1
adapter = ACAD
poll-interval = 5
full-at = 99
low-at = 5
format-charging = <animation-charging> <label-charging>
label-charging = %percentage%%
animation-charging-0 = ’ēä
animation-charging-1 = ’ēā
animation-charging-2 = ’ēé
animation-charging-3 = ’ēü
animation-charging-4 = ’ēĆ
animation-charging-framerate = 750
animation-charging-foreground = ${colors.peach}
format-discharging = <ramp-capacity> <label-discharging>
label-discharging = %percentage%%
ramp-capacity-0 = ’ēä
ramp-capacity-1 = ’ēā
ramp-capacity-2 = ’ēé
ramp-capacity-3 = ’ēü
ramp-capacity-4 = ’ēĆ
format-full-prefix = "’ēĆ "
format-full-prefix-foreground = ${colors.green}
label-full = %percentage%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected =

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#cba6f7}’ć½ %{F-}%essid%

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#cba6f7}ŅĮä %{F-}%local_ip%

[module/date]
type = internal/date
interval = 1
date = %d/%m/%Y %H:%M:%S
date-alt = %A, %d %B %Y %H:%M:%S
label = %date%
label-foreground = ${colors.mauve}

[env]
TERM = "xterm-256color"

[window]
opacity = 0.95
dimensions = { columns = 80, lines = 24 }
padding = { x = 5, y = 5 }
dynamic_padding = false
decorations = "full"

[font]
size = 22

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style = "Bold Italic"

[cursor]
style = { shape = "Block", blinking = "Off" }
blink_interval = 500

[scrolling]
history = 10000

[general]
import = ["colorscheme.toml"]
